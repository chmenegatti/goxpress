version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - revive
    - unconvert
    - prealloc
  exclusions:
    rules:
      # Handlers and middleware must keep the *Context parameter even when a
      # given handler does not use it; revive's unused-parameter fights that.
      - linters:
          - revive
        text: "unused-parameter"

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
